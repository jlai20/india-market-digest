name: Update India Market Digest

on:
  schedule:
    - cron: "0 0 * * 1-6"    # 10am AEST (UTC+10), Mon–Sat
    - cron: "0 23 * * 0-5"   # 10am AEDT (UTC+11), Sun–Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate news digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Commit depository + digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/news_store.json
          git diff --cached --quiet || git commit -m "chore: digest $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
